name: Deploy Frontend

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    if: "!contains(github.event.head_commit.message, 'skip-build')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: satthuno99/core-fe:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Pull new image
        run: docker pull satthuno99/core-fe:latest
      - name: Import image to K3s
        run: docker save satthuno99/core-fe:latest | k3s ctr images import -
      - name: Deploy to K8s
        run: |
          kubectl rollout restart deployment/core-fe -n app
          kubectl rollout status deployment/core-fe -n app
      - name: Cleanup
        run: docker image prune -f
