name: Deploy Frontend

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: satthuno99/core-fe
  DEPLOYMENT: core-fe
  NAMESPACE: app

jobs:
  build-and-push:
    if: "!contains(github.event.head_commit.message, 'skip-build')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_FACEBOOK_APP_ID=${{ secrets.NEXT_PUBLIC_FACEBOOK_APP_ID }}

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply K8s manifest
        run: kubectl apply -f k8s/deployment.yaml

      - name: Restart để pull image latest mới nhất
        run: kubectl rollout restart deployment/${{ env.DEPLOYMENT }} -n ${{ env.NAMESPACE }}

      - name: Chờ rollout hoàn tất
        timeout-minutes: 5
        run: kubectl rollout status deployment/${{ env.DEPLOYMENT }} -n ${{ env.NAMESPACE }}
