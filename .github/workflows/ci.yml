name: Deploy Frontend

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: satthuno99/core-fe

jobs:
  build-and-push:
    if: "!contains(github.event.head_commit.message, 'skip-build')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_FACEBOOK_APP_ID=${{ secrets.NEXT_PUBLIC_FACEBOOK_APP_ID }}

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Update image tag in GitOps repo
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/S-P-A-R-K-D-E-V/spark-infra.git
          cd spark-infra

          sed -i "s|satthuno99/core-fe:.*|satthuno99/core-fe:${{ github.sha }}|" \
            k8s/apps/core-fe/deployment.yaml

          git config user.email "ci@spark.dev"
          git config user.name "GitHub Actions"
          git add k8s/apps/core-fe/deployment.yaml
          git diff --staged --quiet || git commit -m "deploy: core-fe → ${GITHUB_SHA::8}"
          git push
