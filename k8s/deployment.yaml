apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-fe
  namespace: app
  labels:
    app: core-fe
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: core-fe
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: core-fe
    spec:
      # Cần tạo secret một lần trên server:
      # kubectl create secret docker-registry dockerhub-secret \
      #   --docker-username=<USER> --docker-password=<TOKEN> -n app
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: core-fe
          image: satthuno99/core-fe:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: core-fe-secret
          env:
            - name: NODE_ENV
              value: "production"
            - name: BACKEND_URL
              value: "http://core-api:5000"
---
apiVersion: v1
kind: Service
metadata:
  name: core-fe
  namespace: app
spec:
  selector:
    app: core-fe
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
