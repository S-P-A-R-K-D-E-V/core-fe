events {}

http {

    upstream api {
        least_conn;
        server api-1:5000;
        server api-2:5000;
    }

    upstream web {
        least_conn;
        server web-1:3000;
        server web-2:3000;
    }

    server {

        listen 80;

        location /api/ {
            proxy_pass http://api/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

    }

}