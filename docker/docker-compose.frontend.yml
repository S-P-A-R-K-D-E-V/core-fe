services:
  web:
    image: satthuno99/core-fe:latest
    container_name: core-web
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "3000"
    environment:
      - VIRTUAL_HOST=cici21chualang.vn,www.cici21chualang.vn
      - VIRTUAL_PORT=3000
      - VIRTUAL_PATH=/
      - LETSENCRYPT_HOST=cici21chualang.vn,www.cici21chualang.vn
      - LETSENCRYPT_EMAIL=core@cici21chualang.vn
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - core-network

networks:
  core-network:
    external: true